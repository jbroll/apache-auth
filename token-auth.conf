RewriteEngine On

# Validate SERVER_NAME before use in filesystem path.
# With UseCanonicalName Off (Apache default), SERVER_NAME is derived from
# the Host: header and could contain path traversal sequences.
# Two conditions are required:
#   1. Allowlist: only letters, digits, dots, hyphens; must start and end
#      with an alphanumeric character (rejects leading/trailing dot or hyphen).
#   2. Denylist: reject consecutive dots which Apache's PCRE cannot exclude
#      with a pure positive regex without lookaheads.

# If an OPEN sentinel file exists for this host, allow without a token.
RewriteCond %{SERVER_NAME} ^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$
RewriteCond %{SERVER_NAME} !\.\.
RewriteCond /etc/apache-token-auth/tokens/%{SERVER_NAME}/OPEN -f
RewriteRule ^ - [L]

# If the client IP is in the allowlist for this host, allow without a token.
# %{REMOTE_ADDR} is validated to contain only IP address characters (digits,
# hex letters, colons, dots) before use in a filesystem path -- no slash or
# dot-dot traversal is possible with this character set.
RewriteCond %{SERVER_NAME} ^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$
RewriteCond %{SERVER_NAME} !\.\.
RewriteCond %{REMOTE_ADDR} ^[0-9a-fA-F:.]+$
RewriteCond /etc/apache-token-auth/tokens/%{SERVER_NAME}/IP/%{REMOTE_ADDR} -f
RewriteRule ^ - [L]

# Otherwise require a valid bearer token.
RewriteCond %{SERVER_NAME} ^[a-zA-Z0-9]([a-zA-Z0-9.-]*[a-zA-Z0-9])?$
RewriteCond %{SERVER_NAME} !\.\.
RewriteCond %{HTTP:Authorization} ^Bearer\s+([a-f0-9]{32})$
RewriteCond /etc/apache-token-auth/tokens/%{SERVER_NAME}/%1 -f
RewriteRule ^ - [L]

RewriteRule ^ - [F]
